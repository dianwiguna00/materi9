<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan 1 – Konsep Segitiga Siku-Siku dan Komponennya</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    margin:0;
    background:linear-gradient(135deg,#11998e,#38ef7d);
}
.container{
    max-width:1500px;
    margin:auto;
    padding:10px;
}
h1{
    text-align:center;
    color:white;
    margin-bottom:18px;
}
.card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* TOMBOL */
button{
    width:100%;
    padding:14px;
    font-size:20px;
    border:none;
    border-radius:15px;
    margin-bottom:2px;     /* ✅ jarak 0 */
    color:white;
    text-align:left;
    cursor:pointer;
}

.tujuan{background:#16a085;}
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}

/* ISI */
.content{
    display:none;
    font-size:20px;
    line-height:0.6;
    color:#2c3e50;

    padding-top:0px;       /* ✅ benar-benar tanpa jarak atas */
    padding-right:6px;
    padding-left:6px;
    padding-bottom:8px;

    margin-top:0px;
    margin-bottom:10px;

    white-space:pre-line;
}

@media(max-width:600px){
    .content{font-size:22px;}
}
</style>

<script>
function toggle(id){
    const el=document.getElementById(id);
    el.style.display = el.style.display==="block" ? "none" : "block";
}
</script>
</head>

<body>
<div class="container">

<h1>📘 Materi 26</h1>

<div class="card">

TOMBOL

</div>
</div>
</body>
